name: Build And Upload Node Dist

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # package.json
      - name: Read package info
        id: pkg
        run: |
          NAME=$(jq -r .name package.json)
          VERSION=$(jq -r .version package.json)
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 获取线上版本
      - name: Fetch remote version
        id: remote
        run: |
          RESPONSE=$(curl -s --max-time 20 https://${{ secrets.API_URL }}/info || echo "fail")
          
          if [ "$RESPONSE" = "fail" ]; then
            REMOTE_V="none"
          else
            REMOTE_V=$(echo "$RESPONSE" | jq -r '.data.version // "none"' 2>/dev/null || echo "none")
          fi
          
          echo "version=$REMOTE_V" >> $GITHUB_OUTPUT

      # 比较版本
      - name: Compare version
        id: compare
        run: |
          LOCAL="${{ steps.pkg.outputs.version }}"
          REMOTE="${{ steps.remote.outputs.version }}"
          
          echo "Local Version:  $LOCAL"
          echo "Remote Version: $REMOTE"
          
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Same version. Skip build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Different version. Starting build..."
          fi

      # Node 环境
      - name: Setup Node
        if: steps.compare.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 安装依赖
      - name: Install dependencies
        if: steps.compare.outputs.skip == 'false'
        run: npm ci

      # 构建
      - name: Build TypeScript
        if: steps.compare.outputs.skip == 'false'
        run: npm run build

      - name: Check dist exists
        if: steps.compare.outputs.skip == 'false'
        run: |
          if [ ! -d "dist" ]; then
            echo "dist not found!"
            exit 1
          fi

      # 创建远程目录（并清空旧文件）
      - name: Prepare remote directory
        if: steps.compare.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p "/www/wwwroot/${{ steps.pkg.outputs.name }}"
            rm -rf "/www/wwwroot/${{ steps.pkg.outputs.name }}/*"

      # 上传
      - name: Upload project files to server
        if: steps.compare.outputs.skip == 'false'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "package.json,dist/**"
          target: "/www/wwwroot/${{ steps.pkg.outputs.name }}"
          strip_components: 0

      # 记录是否 build
      - name: Export build flag
        run: |
          echo "${{ steps.compare.outputs.skip == 'false' }}" > built.txt

      - name: Upload build flag
        uses: actions/upload-artifact@v4
        with:
          name: build-flag
          path: built.txt
